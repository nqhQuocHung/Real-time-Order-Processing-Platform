spring.application.name=api-gateway
server.port=8080

management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.access=unrestricted

# Auth service route
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=${AUTH_SERVICE_URI:http://localhost:8081}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/auth/**

# Order service route
spring.cloud.gateway.server.webflux.routes[1].id=order-service
spring.cloud.gateway.server.webflux.routes[1].uri=${ORDER_SERVICE_URI:http://localhost:8082}
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/orders/**

# Inventory service route
spring.cloud.gateway.server.webflux.routes[2].id=inventory-service
spring.cloud.gateway.server.webflux.routes[2].uri=${INVENTORY_SERVICE_URI:http://localhost:8083}
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/v1/inventory/**

# Payment service route
spring.cloud.gateway.server.webflux.routes[3].id=payment-service
spring.cloud.gateway.server.webflux.routes[3].uri=${PAYMENT_SERVICE_URI:http://localhost:8084}
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/v1/payments/**

# Notification service route
spring.cloud.gateway.server.webflux.routes[4].id=notification-service
spring.cloud.gateway.server.webflux.routes[4].uri=${NOTIFICATION_SERVICE_URI:http://localhost:8085}
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/v1/notifications/**

# UPDATED: health routes now rewrite to downstream /actuator/health.
spring.cloud.gateway.server.webflux.routes[5].id=auth-service-health
spring.cloud.gateway.server.webflux.routes[5].uri=${AUTH_SERVICE_URI:http://localhost:8081}
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/actuator/auth/health
spring.cloud.gateway.server.webflux.routes[5].filters[0]=SetPath=/actuator/health

spring.cloud.gateway.server.webflux.routes[6].id=order-service-health
spring.cloud.gateway.server.webflux.routes[6].uri=${ORDER_SERVICE_URI:http://localhost:8082}
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/actuator/orders/health
spring.cloud.gateway.server.webflux.routes[6].filters[0]=SetPath=/actuator/health

spring.cloud.gateway.server.webflux.routes[7].id=inventory-service-health
spring.cloud.gateway.server.webflux.routes[7].uri=${INVENTORY_SERVICE_URI:http://localhost:8083}
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/actuator/inventory/health
spring.cloud.gateway.server.webflux.routes[7].filters[0]=SetPath=/actuator/health

spring.cloud.gateway.server.webflux.routes[8].id=payment-service-health
spring.cloud.gateway.server.webflux.routes[8].uri=${PAYMENT_SERVICE_URI:http://localhost:8084}
spring.cloud.gateway.server.webflux.routes[8].predicates[0]=Path=/actuator/payments/health
spring.cloud.gateway.server.webflux.routes[8].filters[0]=SetPath=/actuator/health

spring.cloud.gateway.server.webflux.routes[9].id=notification-service-health
spring.cloud.gateway.server.webflux.routes[9].uri=${NOTIFICATION_SERVICE_URI:http://localhost:8085}
spring.cloud.gateway.server.webflux.routes[9].predicates[0]=Path=/actuator/notifications/health
spring.cloud.gateway.server.webflux.routes[9].filters[0]=SetPath=/actuator/health

# JWT shared secret
security.jwt.secret=${JWT_SECRET:REDACTED_JWT_SECRET}
