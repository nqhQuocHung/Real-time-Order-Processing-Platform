spring.application.name=order-service
server.port=8082
server.http2.enabled=true
spring.jackson.time-zone=Asia/Ho_Chi_Minh

spring.datasource.url=jdbc:postgresql://${ORDER_DB_HOST:localhost}:${ORDER_DB_PORT:5432}/order_db
spring.datasource.username=${ORDER_DB_USERNAME:order_service}
spring.datasource.password=${ORDER_DB_PASSWORD:REDACTED_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=orders
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.jpa.open-in-view=false

# Swagger OpenAPI config
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=orders
spring.flyway.default-schema=orders

app.order.code-prefix=ORD
app.order.default-currency=VND

# JWT configuration for resource server
jwt.secretKey=${JWT_SECRET:REDACTED_JWT_SECRET}

# Kafka producer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.group-id=${ORDER_CONSUMER_GROUP:order-consumer}
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

app.order.topic.created=${TOPIC_ORDER_CREATED:order.lifecycle.created.v1}
app.order.topic.paid=${TOPIC_ORDER_PAID:order.lifecycle.paid.v1}
app.order.topic.completed=${TOPIC_ORDER_COMPLETED:order.lifecycle.completed.v1}
app.order.topic.failed=${TOPIC_ORDER_FAILED:order.lifecycle.failed.v1}
app.order.topic.payment-succeeded=${TOPIC_PAYMENT_SUCCEEDED:payment.transaction.succeeded.v1}
app.order.topic.payment-failed=${TOPIC_PAYMENT_FAILED:payment.transaction.failed.v1}

# Internal RPC workflow (HTTP/2-capable client with h2 fallback)
app.order.rpc.inventory-base-url=${INVENTORY_SERVICE_INTERNAL_URL:http://localhost:8083}
app.order.rpc.payment-base-url=${PAYMENT_SERVICE_INTERNAL_URL:http://localhost:8084}
app.order.rpc.internal-token=${INTERNAL_RPC_TOKEN:change-me}
app.order.rpc.default-payment-method=${ORDER_DEFAULT_PAYMENT_METHOD:VNPAY}
app.order.payment-timeout-minutes=${ORDER_PAYMENT_TIMEOUT_MINUTES:15}
app.order.payment-expiry-scan-delay-ms=${ORDER_PAYMENT_EXPIRY_SCAN_DELAY_MS:10000}
app.internal.token=${INTERNAL_RPC_TOKEN:change-me}
