spring.application.name=notification-service
server.port=8085
server.http2.enabled=true
spring.jackson.time-zone=Asia/Ho_Chi_Minh

spring.datasource.url=jdbc:postgresql://${NOTIFICATION_DB_HOST:localhost}:${NOTIFICATION_DB_PORT:5432}/notification_db
spring.datasource.username=${NOTIFICATION_DB_USERNAME:notification_service}
spring.datasource.password=${NOTIFICATION_DB_PASSWORD:2210Ngahoang.@}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=notification
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=notification
spring.flyway.default-schema=notification

# Swagger OpenAPI config
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true

# JWT configuration for resource server
jwt.secretKey=${JWT_SECRET:357638792F423F4428472B4B6250655368566D597133743677397A2443264629}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Consumer
spring.kafka.consumer.group-id=${NOTIFICATION_CONSUMER_GROUP:notification-consumer}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Payment topics
app.notification.topic.payment-succeeded=${TOPIC_PAYMENT_SUCCEEDED:payment.transaction.succeeded.v1}
app.notification.topic.payment-failed=${TOPIC_PAYMENT_FAILED:payment.transaction.failed.v1}

# Order topics
app.notification.topic.order-completed=${TOPIC_ORDER_COMPLETED:order.lifecycle.completed.v1}
app.notification.topic.order-failed=${TOPIC_ORDER_FAILED:order.lifecycle.failed.v1}

# Partner topics
app.partner.topic.request-created=${TOPIC_PARTNER_REQUEST_CREATED:partner.request.created.v1}
app.partner.topic.request-decided=${TOPIC_PARTNER_REQUEST_DECIDED:partner.request.decided.v1}

# Default recipient
app.notification.default-recipient=${NOTIFICATION_DEFAULT_RECIPIENT:no-reply@example.local}

spring.jackson.serialization.write-dates-as-timestamps=false
