spring.application.name=payment-service
server.port=8084
server.http2.enabled=true
spring.jackson.time-zone=Asia/Ho_Chi_Minh

spring.datasource.url=jdbc:postgresql://${PAYMENT_DB_HOST:localhost}:${PAYMENT_DB_PORT:5432}/payment_db
spring.datasource.username=${PAYMENT_DB_USERNAME:payment_service}
spring.datasource.password=${PAYMENT_DB_PASSWORD:REDACTED_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=payment
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.jpa.open-in-view=false

# Swagger OpenAPI config
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=payment
spring.flyway.default-schema=payment

# JWT configuration for resource server
jwt.secretKey=${JWT_SECRET:REDACTED_JWT_SECRET}


# VNPAY test config
app.payment.vnpay.tmn-code=${VNPAY_TMN_CODE:REDACTED_VNPAY_TMN_CODE}
app.payment.vnpay.hash-secret=${VNPAY_HASH_SECRET:REDACTED_VNPAY_HASH_SECRET}
app.payment.vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
app.payment.vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:5173/payment-return}
app.payment.vnpay.version=${VNPAY_VERSION:2.1.0}
app.payment.vnpay.command=${VNPAY_COMMAND:pay}
app.payment.vnpay.order-type=${VNPAY_ORDER_TYPE:other}
app.payment.vnpay.locale=${VNPAY_LOCALE:vn}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
app.payment.topic.transaction-succeeded=${TOPIC_PAYMENT_SUCCEEDED:payment.transaction.succeeded.v1}
app.payment.topic.transaction-failed=${TOPIC_PAYMENT_FAILED:payment.transaction.failed.v1}

# Redis (idempotency guard)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
app.payment.idempotency.ttl-seconds=${PAYMENT_IDEMPOTENCY_TTL_SECONDS:300}

# Internal RPC protection token
app.internal.token=${INTERNAL_RPC_TOKEN:change-me}
