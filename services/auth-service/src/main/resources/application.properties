spring.application.name=auth-service
spring.config.import=optional:classpath:mailtemplate.properties
server.port=8081
server.http2.enabled=true
spring.jackson.time-zone=Asia/Ho_Chi_Minh

spring.datasource.url=jdbc:postgresql://${AUTH_DB_HOST:localhost}:${AUTH_DB_PORT:5432}/auth_db
spring.datasource.username=${AUTH_DB_USERNAME:auth_service}
spring.datasource.password=${AUTH_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=auth
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=auth
spring.flyway.default-schema=auth

# Swagger OpenAPI config
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Partner topics
app.partner.topic.request-created=${TOPIC_PARTNER_REQUEST_CREATED:partner.request.created.v1}
app.partner.topic.request-decided=${TOPIC_PARTNER_REQUEST_DECIDED:partner.request.decided.v1}

spring.jackson.serialization.write-dates-as-timestamps=false

# JWT Configuration
jwt.secretKey=${JWT_SECRET}
jwt.expiration=900000
jwt.refresh-expiration=604800000
jwt.type=Bearer

MAX.OTP.FAILED.ATTEMPTS=5
app.otp.change-password-expiration-minutes=5
app.otp.forgot-password-expiration-minutes=10

# Pagination Configuration
route.pageSize=10
company.pageSize=10

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.thymeleaf.check-template-location=false

cloudinary.cloudName=${CLOUDINARY_CLOUD_NAME:}
cloudinary.apiKey=${CLOUDINARY_API_KEY:}
cloudinary.apiSecret=${CLOUDINARY_API_SECRET:}
cloudinary.secure=${CLOUDINARY_SECURE:true}

# Upload constraints
app.avatar.max-size-bytes=2097152

# Default avatar and role
app.avatar.default-url=https://www.facebook.com/groups/androidvatvostudio/posts/1045229810299978/
app.default-role=USER
app.admin-role=ADMIN

# I18n message configuration
spring.messages.basename=messages
spring.messages.fallback-to-system-locale=false
spring.messages.use-code-as-default-message=true
