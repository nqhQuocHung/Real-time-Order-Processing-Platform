mail.template.register-success.subject=Registration Successful
mail.template.register-success.body=<html><body style="font-family:Arial,sans-serif;background:#f6f8fb;padding:20px;"><div style="max-width:620px;margin:0 auto;background:#ffffff;border-radius:10px;padding:24px;border:1px solid #e5eaf2;"><h2 style="margin:0 0 12px 0;color:#0d6efd;">Welcome {{username}}</h2><p>Your account ({{email}}) has been registered successfully.</p><p>Your account is currently <b>inactive</b>. Please wait for activation.</p><p style="margin-top:20px;color:#667085;">This is an automated email.</p></div></body></html>

mail.template.account-activated.subject=Your Account Is Activated
mail.template.account-activated.body=<html><body style="font-family:Arial,sans-serif;background:#f6f8fb;padding:20px;"><div style="max-width:620px;margin:0 auto;background:#ffffff;border-radius:10px;padding:24px;border:1px solid #e5eaf2;"><h2 style="margin:0 0 12px 0;color:#198754;">Hi {{username}}</h2><p>Your account ({{email}}) has been activated.</p><p>You can now login and use the system.</p><p style="margin-top:20px;color:#667085;">This is an automated email.</p></div></body></html>

mail.template.account-deactivated.subject=Your Account Is Deactivated
mail.template.account-deactivated.body=<html><body style="font-family:Arial,sans-serif;background:#f6f8fb;padding:20px;"><div style="max-width:620px;margin:0 auto;background:#ffffff;border-radius:10px;padding:24px;border:1px solid #e5eaf2;"><h2 style="margin:0 0 12px 0;color:#dc3545;">Hi {{username}}</h2><p>Your account ({{email}}) has been deactivated.</p><p>If this is unexpected, please contact support.</p><p style="margin-top:20px;color:#667085;">This is an automated email.</p></div></body></html>

mail.template.change-password-otp.subject=Your OTP Code For Password Change
mail.template.change-password-otp.body=<html><body style="font-family:Arial,sans-serif;background:#f6f8fb;padding:20px;"><div style="max-width:620px;margin:0 auto;background:#ffffff;border-radius:10px;padding:24px;border:1px solid #e5eaf2;"><h2 style="margin:0 0 12px 0;color:#0d6efd;">Hi {{username}}</h2><p>You requested to change your password.</p><p>Your OTP code is: <b style="font-size:20px;letter-spacing:2px;">{{otp}}</b></p><p>This code will expire in {{expiredMinutes}} minutes.</p><p>If this request was not made by you, please contact support immediately.</p><p style="margin-top:20px;color:#667085;">This is an automated email.</p></div></body></html>

mail.template.account-locked.subject=Your Account Has Been Locked
mail.template.account-locked.body=<html><body style="font-family:Arial,sans-serif;background:#f6f8fb;padding:20px;"><div style="max-width:620px;margin:0 auto;background:#ffffff;border-radius:10px;padding:24px;border:1px solid #e5eaf2;"><h2 style="margin:0 0 12px 0;color:#dc3545;">Hi {{username}}</h2><p>Your account ({{email}}) has been locked due to too many failed login attempts.</p><p>Please contact support or use password recovery after verification.</p><p style="margin-top:20px;color:#667085;">This is an automated email.</p></div></body></html>
