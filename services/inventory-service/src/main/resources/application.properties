spring.application.name=inventory-service
server.port=8083
server.http2.enabled=true
spring.jackson.time-zone=Asia/Ho_Chi_Minh

spring.datasource.url=jdbc:postgresql://${INVENTORY_DB_HOST:localhost}:${INVENTORY_DB_PORT:5432}/inventory_db
spring.datasource.username=${INVENTORY_DB_USERNAME:inventory_service}
spring.datasource.password=${INVENTORY_DB_PASSWORD:2210Ngahoang.@}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=inventory
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.jpa.open-in-view=false

# Swagger OpenAPI config
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=inventory
spring.flyway.default-schema=inventory
spring.flyway.ignore-migration-patterns=*:missing

# JWT configuration for resource server
jwt.secretKey=${JWT_SECRET:357638792F423F4428472B4B6250655368566D597133743677397A2443264629}

# Redis cache
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.cache.type=redis
spring.cache.redis.time-to-live=${INVENTORY_CACHE_TTL:PT5M}

# Internal RPC protection token
app.internal.token=${INTERNAL_RPC_TOKEN:change-me}

# Cloudinary product image upload
cloudinary.cloudName=${CLOUDINARY_CLOUD_NAME:dixe4ybxu}
cloudinary.apiKey=${CLOUDINARY_API_KEY:899278923884326}
cloudinary.apiSecret=${CLOUDINARY_API_SECRET:O8HZWpijOWUicZjv8zX2KDbPrqo}
cloudinary.secure=${CLOUDINARY_SECURE:true}
app.product.image.max-size-bytes=${PRODUCT_IMAGE_MAX_SIZE_BYTES:5242880}
app.product.default-image-url=${PRODUCT_DEFAULT_IMAGE_URL:https://img.freepik.com/vector-cao-cap/khong-co-bieu-tuong-vector-anh-co-san-bieu-tuong-hinh-anh-mac-dinh-hinh-anh-sap-co-cho-trang-web-hoac-ung-dung-di-dong_87543-18055.jpg}
