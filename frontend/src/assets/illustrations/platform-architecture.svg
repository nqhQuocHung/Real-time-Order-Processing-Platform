<svg width="1200" height="660" viewBox="0 0 1200 660" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#051d46" />
      <stop offset="100%" stop-color="#031126" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d3d84" />
      <stop offset="100%" stop-color="#082554" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8fd8ff" />
    </marker>
  </defs>

  <rect width="1200" height="660" fill="url(#bg)" rx="20" />

  <text x="600" y="52" fill="#dff4ff" font-size="28" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle" font-weight="700">
    Real-time Order Platform - High-level Architecture
  </text>

  <rect x="70" y="140" width="220" height="90" rx="14" fill="url(#card)" stroke="#7fc8ff" stroke-opacity="0.7" />
  <text x="180" y="178" fill="#f2fbff" font-size="22" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle" font-weight="700">Web Client</text>
  <text x="180" y="205" fill="#b7dcff" font-size="16" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">React + TypeScript</text>

  <rect x="350" y="140" width="220" height="90" rx="14" fill="url(#card)" stroke="#7fc8ff" stroke-opacity="0.7" />
  <text x="460" y="178" fill="#f2fbff" font-size="22" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle" font-weight="700">API Gateway</text>
  <text x="460" y="205" fill="#b7dcff" font-size="16" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Routing + Security</text>

  <rect x="640" y="95" width="190" height="80" rx="14" fill="url(#card)" stroke="#7fc8ff" stroke-opacity="0.7" />
  <text x="735" y="128" fill="#f2fbff" font-size="19" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle" font-weight="700">Auth Service</text>
  <text x="735" y="150" fill="#b7dcff" font-size="14" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Users + Permissions</text>

  <rect x="850" y="95" width="190" height="80" rx="14" fill="url(#card)" stroke="#7fc8ff" stroke-opacity="0.7" />
  <text x="945" y="128" fill="#f2fbff" font-size="19" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle" font-weight="700">Order Service</text>
  <text x="945" y="150" fill="#b7dcff" font-size="14" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Order Lifecycle</text>

  <rect x="640" y="205" width="190" height="80" rx="14" fill="url(#card)" stroke="#7fc8ff" stroke-opacity="0.7" />
  <text x="735" y="238" fill="#f2fbff" font-size="19" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle" font-weight="700">Inventory Service</text>
  <text x="735" y="260" fill="#b7dcff" font-size="14" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Catalog + Stock + Reviews</text>

  <rect x="850" y="205" width="190" height="80" rx="14" fill="url(#card)" stroke="#7fc8ff" stroke-opacity="0.7" />
  <text x="945" y="238" fill="#f2fbff" font-size="19" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle" font-weight="700">Payment Service</text>
  <text x="945" y="260" fill="#b7dcff" font-size="14" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Payment Intents + Status</text>

  <rect x="745" y="315" width="190" height="80" rx="14" fill="url(#card)" stroke="#7fc8ff" stroke-opacity="0.7" />
  <text x="840" y="348" fill="#f2fbff" font-size="19" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle" font-weight="700">Notification Service</text>
  <text x="840" y="370" fill="#b7dcff" font-size="14" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Kafka Consumer + SSE</text>

  <rect x="620" y="470" width="250" height="90" rx="14" fill="#0a2148" stroke="#7fc8ff" stroke-opacity="0.7" />
  <text x="745" y="504" fill="#f2fbff" font-size="21" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle" font-weight="700">Kafka Event Bus</text>
  <text x="745" y="532" fill="#b7dcff" font-size="14" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">order.lifecycle.*, payment.*, product.review.*</text>

  <rect x="920" y="470" width="210" height="90" rx="14" fill="#0a2148" stroke="#7fc8ff" stroke-opacity="0.7" />
  <text x="1025" y="504" fill="#f2fbff" font-size="21" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle" font-weight="700">PostgreSQL</text>
  <text x="1025" y="532" fill="#b7dcff" font-size="14" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Service Data Storage</text>

  <line x1="290" y1="185" x2="350" y2="185" stroke="#8fd8ff" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="570" y1="185" x2="640" y2="135" stroke="#8fd8ff" stroke-width="2.5" marker-end="url(#arrow)" />
  <line x1="570" y1="185" x2="640" y2="245" stroke="#8fd8ff" stroke-width="2.5" marker-end="url(#arrow)" />
  <line x1="570" y1="185" x2="850" y2="135" stroke="#8fd8ff" stroke-width="2.5" marker-end="url(#arrow)" />
  <line x1="570" y1="185" x2="850" y2="245" stroke="#8fd8ff" stroke-width="2.5" marker-end="url(#arrow)" />

  <line x1="945" y1="285" x2="870" y2="315" stroke="#8fd8ff" stroke-width="2.5" marker-end="url(#arrow)" />
  <line x1="735" y1="285" x2="810" y2="315" stroke="#8fd8ff" stroke-width="2.5" marker-end="url(#arrow)" />
  <line x1="840" y1="395" x2="745" y2="470" stroke="#8fd8ff" stroke-width="2.8" marker-end="url(#arrow)" />

  <line x1="735" y1="285" x2="710" y2="470" stroke="#66bfff" stroke-width="2.2" marker-end="url(#arrow)" />
  <line x1="945" y1="285" x2="760" y2="470" stroke="#66bfff" stroke-width="2.2" marker-end="url(#arrow)" />

  <line x1="835" y1="515" x2="920" y2="515" stroke="#8fd8ff" stroke-width="3" marker-end="url(#arrow)" />

  <line x1="840" y1="395" x2="230" y2="395" stroke="#5cc6ff" stroke-width="2.2" />
  <line x1="230" y1="395" x2="230" y2="230" stroke="#5cc6ff" stroke-width="2.2" marker-end="url(#arrow)" />
  <text x="262" y="364" fill="#9dd9ff" font-size="13" font-family="Segoe UI, Arial, sans-serif">SSE Notifications</text>

  <text x="78" y="614" fill="#8fb8de" font-size="13" font-family="Segoe UI, Arial, sans-serif">
    Note: Diagram is simplified for overview and onboarding purposes.
  </text>
</svg>
